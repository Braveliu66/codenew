x-gpu-runtime-build: &gpu-runtime-build
  context: ..
  dockerfile: backend/Dockerfile.gpu_runtime
  cache_from:
    - type=local,src=../.docker-build-cache/gpu-runtime
  cache_to:
    - type=local,dest=../.docker-build-cache/gpu-runtime,mode=max
  args:
    GPU_CUDA_BUILD_IMAGE: ${GPU_CUDA_BUILD_IMAGE:-nvidia/cuda:12.8.1-cudnn-devel-ubuntu22.04}
    GPU_CUDA_RUNTIME_IMAGE: ${GPU_CUDA_RUNTIME_IMAGE:-nvidia/cuda:12.8.1-cudnn-runtime-ubuntu22.04}
    LITEVGGT_COMMIT: 4767c17f8b6f176bb751566e92f60eb885040033
    EDGS_COMMIT: 9a897645eb47c1b24d4f9e4428cd745927bf1ee1
    LINGBOT_COMMIT: main
    SPARK_COMMIT: 915c474795e0c78f7cd1b7f4eb97695028b495c0
    TRANSFORMER_ENGINE_VERSION: 2.14.0
    TORCH_VERSION: 2.8.0
    TORCHVISION_VERSION: 0.23.0
    TORCHAUDIO_VERSION: 2.8.0
    TORCH_CUDA_SUFFIX: cu128
    TORCH_INDEX_URLS: ${TORCH_INDEX_URLS:-https://mirrors.aliyun.com/pytorch-wheels/cu128,https://download.pytorch.org/whl/cu128}
    ALGORITHM_REPO_MIRROR_PREFIXES: ${ALGORITHM_REPO_MIRROR_PREFIXES:-}
    EDGS_EXTENSION_INSTALL_MODE: source
    INSTALL_FLASHINFER: "false"
    HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    APT_MIRROR: ${UBUNTU_APT_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/ubuntu}
    PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}

x-api-build: &api-build
  context: ..
  dockerfile: backend/Dockerfile.api
  cache_from:
    - type=local,src=../.docker-build-cache/api
  cache_to:
    - type=local,dest=../.docker-build-cache/api,mode=max
  args:
    API_BASE_IMAGE: ${API_BASE_IMAGE:-python:3.12-slim}
    APT_MIRROR: ${DEBIAN_APT_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/debian}
    APT_SECURITY_MIRROR: ${DEBIAN_APT_SECURITY_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/debian-security}

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: three_dgs
      POSTGRES_USER: three_dgs
      POSTGRES_PASSWORD: three_dgs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  backend:
    image: three-dgs-api:local
    build: *api-build
    command: sh -lc "alembic upgrade head && python -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://three_dgs:three_dgs@postgres:5432/three_dgs
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: three-dgs
      MINIO_SECURE: "false"
      JWT_SECRET: change-this-in-production
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: admin123
      ALGORITHM_REGISTRY_PATH: /opt/three-dgs/runtime/algorithm_registry.generated.json
      THREE_DGS_STORAGE_ROOT: /workspace/storage
      THREE_DGS_CORS_ORIGINS: http://localhost:3001,http://127.0.0.1:3001,http://localhost:3000,http://127.0.0.1:3000
      PREVIEW_MIN_INPUT_FRAMES: "8"
      PREVIEW_MAX_INPUT_FRAMES: "800"
      PREVIEW_DEFAULT_EDGS_EPOCHS: "3000"
      PREVIEW_DEFAULT_PIPELINE: edgs
      VIDEO_PREVIEW_MODE: windowed
    volumes:
      - ../backend:/workspace/backend
      - ../alembic:/workspace/alembic
      - ../alembic.ini:/workspace/alembic.ini
      - ../.runtime:/workspace/.runtime
      - ../storage:/workspace/storage
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped
  image-worker:
    image: three-dgs-gpu-runtime:local
    build: *gpu-runtime-build
    command: sh -lc "python3 -m backend.scripts.ensure_model_weights --models litevggt --cache-root /model-cache && alembic upgrade head && python3 -m backend.workers.preview_worker"
    environment:
      DATABASE_URL: postgresql+psycopg://three_dgs:three_dgs@postgres:5432/three_dgs
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: three-dgs
      MINIO_SECURE: "false"
      JWT_SECRET: change-this-in-production
      ALGORITHM_REGISTRY_PATH: /opt/three-dgs/runtime/image_algorithm_registry.generated.json
      THREE_DGS_STORAGE_ROOT: /workspace/storage
      PREVIEW_MIN_INPUT_FRAMES: "8"
      PREVIEW_MAX_INPUT_FRAMES: "800"
      PREVIEW_DEFAULT_EDGS_EPOCHS: "3000"
      PREVIEW_DEFAULT_PIPELINE: edgs
      PREVIEW_WORKER_INPUT_TYPE: images
      HF_ENDPOINT: https://hf-mirror.com
      MODEL_CACHE_ROOT: /model-cache
    volumes:
      - ../backend:/workspace/backend
      - ../alembic:/workspace/alembic
      - ../alembic.ini:/workspace/alembic.ini
      - ../.runtime:/workspace/.runtime
      - ../storage:/workspace/storage
      - ../model-cache:/model-cache
    depends_on:
      - backend
      - redis
      - minio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  video-worker:
    image: three-dgs-gpu-runtime:local
    build: *gpu-runtime-build
    command: sh -lc "python3 -m backend.scripts.ensure_model_weights --models lingbot-map --cache-root /model-cache && alembic upgrade head && python3 -m backend.workers.preview_worker"
    environment:
      DATABASE_URL: postgresql+psycopg://three_dgs:three_dgs@postgres:5432/three_dgs
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: three-dgs
      MINIO_SECURE: "false"
      JWT_SECRET: change-this-in-production
      ALGORITHM_REGISTRY_PATH: /opt/three-dgs/runtime/video_algorithm_registry.generated.json
      THREE_DGS_STORAGE_ROOT: /workspace/storage
      PREVIEW_WORKER_INPUT_TYPE: video
      PREVIEW_MIN_INPUT_FRAMES: "8"
      PREVIEW_MAX_INPUT_FRAMES: "800"
      LINGBOT_MODEL_PATH: /model-cache/lingbot-map/lingbot-map-long.pt
      VIDEO_PREVIEW_MODE: windowed
      HF_ENDPOINT: https://hf-mirror.com
      MODEL_CACHE_ROOT: /model-cache
    volumes:
      - ../backend:/workspace/backend
      - ../alembic:/workspace/alembic
      - ../alembic.ini:/workspace/alembic.ini
      - ../.runtime:/workspace/.runtime
      - ../storage:/workspace/storage
      - ../model-cache:/model-cache
    depends_on:
      - backend
      - redis
      - minio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  camera-worker:
    image: three-dgs-gpu-runtime:local
    build: *gpu-runtime-build
    command: sh -lc "python3 -m backend.scripts.ensure_model_weights --models lingbot-map --cache-root /model-cache && alembic upgrade head && python3 -m backend.workers.preview_worker"
    environment:
      DATABASE_URL: postgresql+psycopg://three_dgs:three_dgs@postgres:5432/three_dgs
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: three-dgs
      MINIO_SECURE: "false"
      JWT_SECRET: change-this-in-production
      ALGORITHM_REGISTRY_PATH: /opt/three-dgs/runtime/video_algorithm_registry.generated.json
      THREE_DGS_STORAGE_ROOT: /workspace/storage
      PREVIEW_WORKER_INPUT_TYPE: camera
      PREVIEW_MIN_INPUT_FRAMES: "1"
      PREVIEW_MAX_INPUT_FRAMES: "800"
      LINGBOT_MODEL_PATH: /model-cache/lingbot-map/lingbot-map-long.pt
      VIDEO_PREVIEW_MODE: streaming
      HF_ENDPOINT: https://hf-mirror.com
      MODEL_CACHE_ROOT: /model-cache
    volumes:
      - ../backend:/workspace/backend
      - ../alembic:/workspace/alembic
      - ../alembic.ini:/workspace/alembic.ini
      - ../.runtime:/workspace/.runtime
      - ../storage:/workspace/storage
      - ../model-cache:/model-cache
    depends_on:
      - backend
      - redis
      - minio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      cache_from:
        - type=local,src=../.docker-build-cache/frontend
      cache_to:
        - type=local,dest=../.docker-build-cache/frontend,mode=max
      args:
        NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        NEXT_BUILD: "false"
        VIEWER_TARGET_FPS: "90"
        VIEWER_QUALITY_UP_FPS: "105"
        VIEWER_QUALITY_DOWN_FPS: "90"
        VIEWER_ADAPTIVE_QUALITY: "true"
    command: sh -lc "if [ ! -d node_modules/next ]; then npm ci; fi; npm run dev -- -H 0.0.0.0"
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      VIEWER_TARGET_FPS: "90"
      VIEWER_QUALITY_UP_FPS: "105"
      VIEWER_QUALITY_DOWN_FPS: "90"
      VIEWER_ADAPTIVE_QUALITY: "true"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  frontend_node_modules:
  frontend_next_cache:
