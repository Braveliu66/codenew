services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: three_dgs
      POSTGRES_USER: three_dgs
      POSTGRES_PASSWORD: three_dgs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile.preview
      args:
        LITEVGGT_COMMIT: 4767c17f8b6f176bb751566e92f60eb885040033
        EDGS_COMMIT: 9a897645eb47c1b24d4f9e4428cd745927bf1ee1
        SPARK_COMMIT: 915c474795e0c78f7cd1b7f4eb97695028b495c0
        HF_ENDPOINT: https://hf-mirror.com
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
    command: sh -lc "alembic upgrade head && python3 -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://three_dgs:three_dgs@postgres:5432/three_dgs
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: three-dgs
      MINIO_SECURE: "false"
      JWT_SECRET: change-this-in-production
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: admin123
      ALGORITHM_REGISTRY_PATH: /opt/three-dgs/runtime/algorithm_registry.generated.json
      THREE_DGS_STORAGE_ROOT: /workspace/storage
      THREE_DGS_CORS_ORIGINS: http://localhost:3001,http://127.0.0.1:3001,http://localhost:3000,http://127.0.0.1:3000
      PREVIEW_MIN_INPUT_FRAMES: "8"
      PREVIEW_MAX_INPUT_FRAMES: "800"
      PREVIEW_DEFAULT_EDGS_EPOCHS: "3000"
    volumes:
      - ../.runtime:/workspace/.runtime
      - ../storage:/workspace/storage
    depends_on:
      - postgres
      - redis
      - minio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile.preview
      args:
        LITEVGGT_COMMIT: 4767c17f8b6f176bb751566e92f60eb885040033
        EDGS_COMMIT: 9a897645eb47c1b24d4f9e4428cd745927bf1ee1
        SPARK_COMMIT: 915c474795e0c78f7cd1b7f4eb97695028b495c0
        HF_ENDPOINT: https://hf-mirror.com
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
    command: sh -lc "alembic upgrade head && python3 -m backend.workers.preview_worker"
    environment:
      DATABASE_URL: postgresql+psycopg://three_dgs:three_dgs@postgres:5432/three_dgs
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: three-dgs
      MINIO_SECURE: "false"
      JWT_SECRET: change-this-in-production
      ALGORITHM_REGISTRY_PATH: /opt/three-dgs/runtime/algorithm_registry.generated.json
      THREE_DGS_STORAGE_ROOT: /workspace/storage
      PREVIEW_MIN_INPUT_FRAMES: "8"
      PREVIEW_MAX_INPUT_FRAMES: "800"
      PREVIEW_DEFAULT_EDGS_EPOCHS: "3000"
    volumes:
      - ../.runtime:/workspace/.runtime
      - ../storage:/workspace/storage
    depends_on:
      - backend
      - redis
      - minio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        VIEWER_TARGET_FPS: "90"
        VIEWER_QUALITY_UP_FPS: "105"
        VIEWER_QUALITY_DOWN_FPS: "90"
        VIEWER_ADAPTIVE_QUALITY: "true"
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      VIEWER_TARGET_FPS: "90"
      VIEWER_QUALITY_UP_FPS: "105"
      VIEWER_QUALITY_DOWN_FPS: "90"
      VIEWER_ADAPTIVE_QUALITY: "true"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
